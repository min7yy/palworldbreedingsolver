<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PalPath — shortest Palworld breeding routes</title>
<meta name="description" content="Shortest breeding path between any two Palworld pals — exact game data, works offline.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='24' y2='24'%3E%3Cstop stop-color='%233FA76A'/%3E%3Cstop offset='1' stop-color='%236FDD9C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M8.8 15.4 15.2 8.6' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-dasharray='0.5 3.2'/%3E%3Ccircle cx='7' cy='17' r='2.3' fill='%23fff'/%3E%3Ccircle cx='17' cy='7' r='2.3' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M8.8 15.4 15.2 8.6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.5 3.2"/>
        <circle cx="7" cy="17" r="2.3" fill="#fff"/>
        <circle cx="17" cy="7" r="2.3" fill="#fff"/>
      </svg>
    </div>
    <div>
      <h1>PalPath</h1>
      <span>Shortest breeding path · exact game data</span>
    </div>
  </div>
</header>

<div class="pickers">
  <div class="pane">
    <div class="lbl"><span>Start</span><span class="sel-name" id="ss"></span></div>
    <div class="search">⌕<input type="text" id="qs" placeholder="Search pals…" oninput="renderList('s')"></div>
    <div class="list" id="ls"></div>
  </div>
  <div class="pane">
    <div class="lbl"><span>Target</span><span class="sel-name" id="st"></span></div>
    <div class="search">⌕<input type="text" id="qt" placeholder="Search pals…" oninput="renderList('t')"></div>
    <div class="list" id="lt"></div>
  </div>
</div>
<div class="swapbar"><button onclick="swap()"><span>⇅</span><span>Swap</span></button></div>

<div id="out"><div class="msg idle">Select a <span class="kbd">start</span> and <span class="kbd">target</span> pal to solve the fastest route.</div></div>

<footer>
  <p>Exact lookup of the game's breeding table · 226 pals incl. DLC · passives carry through every step.</p>
  <p>Partner options are unordered — any listed partner works identically.</p>
</footer>
</div>

<script src="data/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
